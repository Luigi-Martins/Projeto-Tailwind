<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>Forest</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="bg-verde-800 font-sans">
    <div class="container mt-4 flex justify-center md:justify-start">
      <div class="inline-flex items-center rounded-md bg-verde-900">
        <span
          class="size-2 border-solid border-2 border-verde-200 rounded-full bg-verde-200 relative -left-1"
        ></span>
        <div class="flex text-verde-300 divide-x-2 divide-verde-800">
          <div class="py-2 px-4 text-sm capitalize" id="dia">terça</div>
          <div class="py-2 px-4 text-sm" id="temperatura">23</div>
          <div class="py-2 px-4 text-sm" id="tempo"><span>🌦️</span> 28%</div>
        </div>
      </div>
    </div>
    <header class="container flex items-center justify-between gap-8 py-8">
      <a href="/">
        <img src="./img/forest.svg" alt="" />
      </a>
      <nav class="flex container justify-end">
        <ul class="flex flex-wrap gap-8 text-xl text-white">
          <li>
            <a
              class="hover:underline hover:underline-offset-8"
              href="#acomodacoes"
              >Acomodações</a
            >
          </li>
          <li>
            <a class="hover:underline hover:underline-offset-8" href="#eventos"
              >Eventos</a
            >
          </li>
          <li>
            <a
              class="hover:underline hover:underline-offset-8"
              href="#experiencias"
              >Experiências</a
            >
          </li>
          <li>
            <a class="hover:underline hover:underline-offset-8" href="#contato"
              >Contato</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <div
        class="rounded-2xl overflow-hidden bg-gradient-to-t from-verde-950/80 text-white relative px-8 pb-8 pt-64"
      >
        <img
          class="absolute size-full inset-0 object-cover -z-10"
          src="./img/floresta.jpg"
          alt=""
        />
        <div
          class="bg-verde-950 inline-flex mb-8 gap-8 items-center py-1 pl-4 pr-1 rounded-full"
        >
          vagas para dezembro abertas
          <a
            class="bg-verde-400 text-verde-900 py-2 px-4 inline-block rounded-full"
            href="/"
            >Reserve hoje</a
          >
        </div>
        <h1 class="mb-20 font-serif text-balance max-w-screen-sm text-5xl">
          Venha Experimentar a Vida na Floresta
        </h1>
        <div class="text-sm flex justify-between items-end">
          <p>
            Melhores locais para visitar
            <a
              class="underline decoration-2 underline-offset-4 hover:no-underline"
              href="/"
              >2049</a
            >
          </p>
          <div class="">
            <p class="uppercase mb-2">Recomendado por</p>
            <p class="flex item-center gap-4">
              <img class="w-28" src="./img/parceiros/wildbeast.svg" alt="" />
              <span>|</span>
              Revista Nacional
            </p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
